name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: lint + tests ─────────────────────────────────────────────────
  backend-tests:
    name: Backend Tests (Python)
    runs-on: ubuntu-latest

    env:
      # Test-only environment — SQLite used in tests, no real DB needed
      SECRET_KEY: "ci-test-secret-key-32-chars-minimum-here"
      ADMIN_DEFAULT_PASSWORD: "CITestPass2026!"
      DATABASE_URL: "sqlite:///./test.db"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Run pytest
        working-directory: backend
        run: python -m pytest tests/ -v --tb=short --no-header

  # ── Frontend: lint + type-check ───────────────────────────────────────────
  frontend-lint:
    name: Frontend Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript type check
        run: npx tsc --noEmit

  # ── Docker build validation ───────────────────────────────────────────────
  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-lint]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f backend/Dockerfile ./backend --tag jdgk-backend:ci

      - name: Build frontend image
        run: |
          docker build \
            --build-arg VITE_API_URL=http://localhost:3000 \
            --tag jdgk-frontend:ci \
            .
